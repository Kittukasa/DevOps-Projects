name: Android CI and CD

on:
  push:
    branches: 
      - main
      - qa
      - develop
  pull_request:
    branches: 
      - main
      - qa

env:
  AWS_DEFAULT_REGION: "ap-south-1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Git Repository
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Gradle Clean
      run: ./gradlew clean
      
    - name: Gradle Lint
      run: ./gradlew lint
      
    - name: Gradle Build
      run: ./gradlew build
         
    - name: Code Coverage - Jacoco
      run: ./gradlew jacocoTest
      
    - name: Cache SonarQube packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
   
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: ${{ runner.os }}-gradle
          
    - name: SonarQube Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: ./gradlew sonarqube -Dsonar.projectKey=android-demo-app
      
    - name: Date and Time
      id: date
      run: echo "current_date_time=$(date +"%d-%m-%Y-%H-%I-%M-%S")" >> $GITHUB_OUTPUT

    - name: Copy APK files
      run: |
        mkdir -p apk-files/debug apk-files/release
        cp ${{ github.workspace }}/app/build/outputs/apk/debug/app-debug.apk \
           ${{ github.workspace }}/apk-files/debug/app-debug-${{ steps.date.outputs.current_date_time }}.apk
        cp ${{ github.workspace }}/app/build/outputs/apk/release/app-release-unsigned.apk \
           ${{ github.workspace }}/apk-files/release/app-release-unsigned-${{ steps.date.outputs.current_date_time }}.apk
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: apk-files-s3
        path: ${{ github.workspace }}/apk-files/
        if-no-files-found: ignore

    outputs:
      CURRENT_DATE_TIME: ${{ steps.date.outputs.current_date_time }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if:
      contains('
        refs/heads/qa
        refs/heads/main
      ', github.ref)
      
    steps:
    - name: Check out Git Repository
      uses: actions/checkout@v3
      
    - name: Download APK artifact
      uses: actions/download-artifact@v3
      with:
        name: apk-files-s3
        path: ${{ github.workspace }}/apk-files/

    - name: Display downloaded files
      run: ls -R
      working-directory: ${{ github.workspace }}/apk-files/

    - name: Organise by branch
      run: |
        if [[ ${{ github.ref }} == 'refs/heads/qa' ]]; then
          cd ${{ github.workspace }}/apk-files && mkdir -p qa && mv debug/ qa/ && mv release/ qa/
        elif [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
          cd ${{ github.workspace }}/apk-files && mkdir -p main && mv debug/ main/ && mv release/ main/
        fi

    - name: Upload APKs to S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ap-south-1
      run: |
        if [[ ${{ github.ref }} == 'refs/heads/qa' ]]; then
          aws s3 cp apk-files/qa/ s3://android-apk-artifacts/qa/ --recursive
        elif [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
          aws s3 cp apk-files/main/ s3://android-apk-artifacts/main/ --recursive
        fi
